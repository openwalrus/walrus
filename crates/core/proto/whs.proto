syntax = "proto3";

package walrus.whs;

// ── WHS (Walrus Hook Service) Protocol ───────────────────────────

message WhsRequest {
  oneof msg {
    WhsHello hello = 1;
    WhsRegisterTools register_tools = 2;
    WhsToolCall tool_call = 3;
    WhsServiceQuery service_query = 4;
    WhsShutdown shutdown = 5;
    WhsConfigure configure = 6;
    WhsBuildAgent build_agent = 7;
    WhsBeforeRun before_run = 8;
    WhsCompact compact = 9;
    WhsEvent event = 10;
    WhsGetSchema get_schema = 11;
  }
}

message WhsHello {
  string version = 1;
}

message WhsRegisterTools {}
message WhsShutdown {}
message WhsConfigure {
  string config = 1;
}
message WhsConfigured {}

message WhsToolCall {
  string name = 1;
  string args = 2;
  string agent = 3;
  optional uint64 task_id = 4;
}

message WhsServiceQuery {
  string query = 1;
}

// Fire-and-forget observation message (daemon → hook).
message WhsEvent {
  string agent = 1;
  string event = 2;
}

// Request the service's config JSON Schema.
message WhsGetSchema {}

message WhsResponse {
  oneof msg {
    WhsReady ready = 1;
    WhsToolSchemas tool_schemas = 2;
    WhsToolResult tool_result = 3;
    WhsServiceQueryResult service_query_result = 4;
    WhsError error = 5;
    WhsConfigured configured = 6;
    WhsBuildAgentResult build_agent_result = 7;
    WhsBeforeRunResult before_run_result = 8;
    WhsCompactResult compact_result = 9;
    WhsSchemaResult schema_result = 10;
  }
}

message WhsReady {
  string version = 1;
  string service = 2;
  repeated Capability capabilities = 3;
}

message Capability {
  oneof cap {
    ToolsList tools = 1;
    QueryCap query = 2;
    BuildAgentCap build_agent = 3;
    BeforeRunCap before_run = 4;
    CompactCap compact = 5;
    EventObserverCap event_observer = 6;
  }
}

message ToolsList {
  repeated string names = 1;
}

message QueryCap {}

message ToolDef {
  string name = 1;
  string description = 2;
  bytes parameters = 3;
  bool strict = 4;
}

message WhsToolSchemas {
  repeated ToolDef tools = 1;
}

message WhsToolResult {
  string result = 1;
}

message WhsServiceQueryResult {
  string result = 1;
}

message WhsError {
  string message = 1;
}

// Config schema response from a hook service.
message WhsSchemaResult {
  string schema = 1;
}

// ── WHS Lifecycle Messages ──────────────────────────────────────

message SimpleMessage {
  string role = 1;
  string content = 2;
}

message BuildAgentCap {}
message BeforeRunCap {}
message CompactCap {}
message EventObserverCap {}

message WhsBuildAgent {
  string name = 1;
  string description = 2;
  string system_prompt = 3;
  repeated string tools = 4;
  repeated string skills = 5;
  repeated string mcps = 6;
  repeated string members = 7;
}

message WhsBuildAgentResult {
  string prompt_addition = 1;
  repeated ToolDef tools = 2;
}

message WhsBeforeRun {
  string agent = 1;
  repeated SimpleMessage history = 2;
}

message WhsBeforeRunResult {
  repeated SimpleMessage messages = 1;
}

message WhsCompact {
  string agent = 1;
  string prompt = 2;
}

message WhsCompactResult {
  string addition = 1;
}
