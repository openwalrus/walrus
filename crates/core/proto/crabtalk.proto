syntax = "proto3";

package crabtalk.protocol;

option swift_prefix = "CrabtalkProto_";

// ── Client Messages ──────────────────────────────────────────────

message ClientMessage {
  oneof msg {
    SendMsg send = 1;
    StreamMsg stream = 2;
    Ping ping = 3;
    HubMsg hub = 4;
    Sessions sessions = 5;
    KillMsg kill = 6;
    // Fields 7-11 removed (task protocol).
    Downloads downloads = 12;
    SubscribeDownloads subscribe_downloads = 13;
    GetConfig get_config = 14;
    SetConfigMsg set_config = 15;
    // Fields 16-20 removed (service protocol).
    ReloadMsg reload = 21;
    SubscribeEvents subscribe_events = 22;
    ReplyToAsk reply_to_ask = 23;
  }
}

message SendMsg {
  string agent = 1;
  string content = 2;
  optional uint64 session = 3;
  optional string sender = 4;
}

message StreamMsg {
  string agent = 1;
  string content = 2;
  optional uint64 session = 3;
  optional string sender = 4;
}

message Ping {}
message Sessions {}
message Downloads {}
message SubscribeDownloads {}
message SubscribeEvents {}
message GetConfig {}

message HubMsg {
  string package = 1;
  HubAction action = 2;
  // Optional filters: "skill:name", "mcp:name", "agent:name".
  // If empty, all components are installed/uninstalled.
  repeated string filters = 3;
}

enum HubAction {
  HUB_ACTION_INSTALL = 0;
  HUB_ACTION_UNINSTALL = 1;
}

message KillMsg {
  uint64 session = 1;
}

message SetConfigMsg {
  string config = 1;
}

message ReloadMsg {}

// ── Server Messages ──────────────────────────────────────────────

message ServerMessage {
  oneof msg {
    SendResponse response = 1;
    StreamEvent stream = 2;
    DownloadEvent download = 3;
    ErrorMsg error = 4;
    Pong pong = 5;
    SessionList sessions = 6;
    DownloadList downloads = 7;
    // Fields 8-10 removed (task protocol).
    ConfigMsg config = 11;
    // Fields 12-15 removed (service protocol).
    AgentEventMsg agent_event = 16;
  }
}

message Pong {}

message SendResponse {
  string agent = 1;
  string content = 2;
  uint64 session = 3;
}

message ToolCallInfo {
  string name = 1;
  string arguments = 2;
}

message StreamEvent {
  oneof event {
    StreamStart start = 1;
    StreamChunk chunk = 2;
    StreamThinking thinking = 3;
    ToolStartEvent tool_start = 4;
    ToolResultEvent tool_result = 5;
    ToolsCompleteEvent tools_complete = 6;
    StreamEnd end = 7;
    AskUserEvent ask_user = 8;
  }
}

message StreamStart {
  string agent = 1;
  uint64 session = 2;
}

message StreamChunk {
  string content = 1;
}

message StreamThinking {
  string content = 1;
}

message ToolStartEvent {
  repeated ToolCallInfo calls = 1;
}

message ToolResultEvent {
  string call_id = 1;
  string output = 2;
}

message ToolsCompleteEvent {}

message StreamEnd {
  string agent = 1;
}

message AskUserEvent {
  string question = 1;
}

message ReplyToAsk {
  uint64 session = 1;
  string content = 2;
}

enum DownloadKind {
  DOWNLOAD_KIND_HUB = 0;
  DOWNLOAD_KIND_EMBEDDINGS = 1;
  DOWNLOAD_KIND_SKILL = 2;
  DOWNLOAD_KIND_HOOK = 3;
}

message DownloadEvent {
  oneof event {
    DownloadCreated created = 1;
    DownloadProgress progress = 2;
    DownloadStep step = 3;
    DownloadCompleted completed = 4;
    DownloadFailed failed = 5;
  }
}

message DownloadCreated {
  uint64 id = 1;
  DownloadKind kind = 2;
  string label = 3;
}

message DownloadProgress {
  uint64 id = 1;
  uint64 bytes = 2;
  uint64 total_bytes = 3;
}

message DownloadStep {
  uint64 id = 1;
  string message = 2;
}

message DownloadCompleted {
  uint64 id = 1;
}

message DownloadFailed {
  uint64 id = 1;
  string error = 2;
}

message DownloadInfo {
  uint64 id = 1;
  DownloadKind kind = 2;
  string label = 3;
  string status = 4;
  uint64 bytes_downloaded = 5;
  uint64 total_bytes = 6;
  optional string error = 7;
  uint64 alive_secs = 8;
}

message ErrorMsg {
  uint32 code = 1;
  string message = 2;
}

message SessionInfo {
  uint64 id = 1;
  string agent = 2;
  string created_by = 3;
  uint64 message_count = 4;
  uint64 alive_secs = 5;
  bool active = 6;
}

enum AgentEventKind {
  TEXT_DELTA = 0;
  THINKING_DELTA = 1;
  TOOL_START = 2;
  TOOL_RESULT = 3;
  TOOLS_COMPLETE = 4;
  DONE = 5;
}

message AgentEventMsg {
  string agent = 1;
  uint64 session = 2;
  AgentEventKind kind = 3;
  string content = 4;
}

message SessionList {
  repeated SessionInfo sessions = 1;
}

message DownloadList {
  repeated DownloadInfo downloads = 1;
}

message ConfigMsg {
  string config = 1;
}
