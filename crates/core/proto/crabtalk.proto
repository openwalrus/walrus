syntax = "proto3";

package crabtalk.protocol;

option swift_prefix = "CrabtalkProto_";

// ── Client Messages ──────────────────────────────────────────────

message ClientMessage {
  oneof msg {
    SendMsg send = 1;
    StreamMsg stream = 2;
    Ping ping = 3;
    Sessions sessions = 4;
    KillMsg kill = 5;
    GetConfig get_config = 6;
    SetConfigMsg set_config = 7;
    ReloadMsg reload = 8;
    SubscribeEvents subscribe_events = 9;
    ReplyToAsk reply_to_ask = 10;
    GetStats get_stats = 11;
    CreateCronMsg create_cron = 12;
    DeleteCronMsg delete_cron = 13;
    ListCronsMsg list_crons = 14;
    CompactMsg compact = 15;
  }
}

message SendMsg {
  string agent = 1;
  string content = 2;
  optional uint64 session = 3;
  optional string sender = 4;
  optional string cwd = 5;
  bool new_chat = 6;
  optional string resume_file = 7;
}

message StreamMsg {
  string agent = 1;
  string content = 2;
  optional uint64 session = 3;
  optional string sender = 4;
  optional string cwd = 5;
  bool new_chat = 6;
  optional string resume_file = 7;
}

message Ping {}
message Sessions {}
message SubscribeEvents {}
message GetConfig {}
message GetStats {}

message KillMsg {
  uint64 session = 1;
}

message SetConfigMsg {
  string config = 1;
}

message ReloadMsg {}

message CreateCronMsg {
  string schedule = 1;
  string skill = 2;
  uint64 session = 3;
  optional string quiet_start = 4;
  optional string quiet_end = 5;
  bool once = 6;
}

message DeleteCronMsg {
  uint64 id = 1;
}

message ListCronsMsg {}

message CompactMsg {
  uint64 session = 1;
}

// ── Server Messages ──────────────────────────────────────────────

message ServerMessage {
  oneof msg {
    SendResponse response = 1;
    StreamEvent stream = 2;
    ErrorMsg error = 3;
    Pong pong = 4;
    SessionList sessions = 5;
    ConfigMsg config = 6;
    AgentEventMsg agent_event = 7;
    DaemonStats stats = 8;
    CronInfo cron_info = 9;
    CronList cron_list = 10;
    CompactResponse compact = 11;
  }
}

message DaemonStats {
  uint64 uptime_secs = 1;
  uint32 active_sessions = 2;
  uint32 registered_agents = 3;
}

message Pong {}

message CompactResponse {
  string summary = 1;
}

message TokenUsage {
  uint32 prompt_tokens = 1;
  uint32 completion_tokens = 2;
  uint32 total_tokens = 3;
  optional uint32 cache_hit_tokens = 4;
  optional uint32 cache_miss_tokens = 5;
  optional uint32 reasoning_tokens = 6;
}

message SendResponse {
  string agent = 1;
  string content = 2;
  uint64 session = 3;
  string provider = 4;
  string model = 5;
  optional TokenUsage usage = 6;
}

message ToolCallInfo {
  string name = 1;
  string arguments = 2;
}

message StreamEvent {
  oneof event {
    StreamStart start = 1;
    StreamChunk chunk = 2;
    StreamThinking thinking = 3;
    ToolStartEvent tool_start = 4;
    ToolResultEvent tool_result = 5;
    ToolsCompleteEvent tools_complete = 6;
    StreamEnd end = 7;
    AskUserEvent ask_user = 8;
  }
}

message StreamStart {
  string agent = 1;
  uint64 session = 2;
}

message StreamChunk {
  string content = 1;
}

message StreamThinking {
  string content = 1;
}

message ToolStartEvent {
  repeated ToolCallInfo calls = 1;
}

message ToolResultEvent {
  string call_id = 1;
  string output = 2;
  uint64 duration_ms = 3;
}

message ToolsCompleteEvent {}

message StreamEnd {
  string agent = 1;
  string error = 2;
  string provider = 3;
  string model = 4;
  optional TokenUsage usage = 5;
}

message AskUserEvent {
  repeated AskQuestion questions = 1;
}

message AskQuestion {
  string question = 1;
  string header = 2;
  repeated AskOption options = 3;
  bool multi_select = 4;
}

message AskOption {
  string label = 1;
  string description = 2;
}

message ReplyToAsk {
  uint64 session = 1;
  string content = 2;
}

message ErrorMsg {
  uint32 code = 1;
  string message = 2;
}

message SessionInfo {
  uint64 id = 1;
  string agent = 2;
  string created_by = 3;
  uint64 message_count = 4;
  uint64 alive_secs = 5;
  bool active = 6;
  string title = 7;
}

enum AgentEventKind {
  TEXT_DELTA = 0;
  THINKING_DELTA = 1;
  TOOL_START = 2;
  TOOL_RESULT = 3;
  TOOLS_COMPLETE = 4;
  DONE = 5;
}

message AgentEventMsg {
  string agent = 1;
  uint64 session = 2;
  AgentEventKind kind = 3;
  string content = 4;
  string timestamp = 5;
}

message SessionList {
  repeated SessionInfo sessions = 1;
}

message ConfigMsg {
  string config = 1;
}

message CronInfo {
  uint64 id = 1;
  string schedule = 2;
  string skill = 3;
  uint64 session = 4;
  string quiet_start = 5;
  string quiet_end = 6;
  bool once = 7;
}

message CronList {
  repeated CronInfo crons = 1;
}
