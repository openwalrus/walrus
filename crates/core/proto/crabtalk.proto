syntax = "proto3";

package crabtalk.protocol;

option swift_prefix = "CrabtalkProto_";

// ── Client Messages ──────────────────────────────────────────────

message ClientMessage {
  oneof msg {
    // Execution
    SendMsg send = 1;
    StreamMsg stream = 2;
    ReplyToAsk reply_to_ask = 3;
    // Session management
    Sessions sessions = 4;
    KillMsg kill = 5;
    CompactMsg compact = 6;
    ListConversationsMsg list_conversations = 7;
    // Provider management
    ListProvidersMsg list_providers = 8;
    SetProviderMsg set_provider = 9;
    DeleteProviderMsg delete_provider = 10;
    SetActiveModelMsg set_active_model = 11;
    ListProviderPresetsMsg list_provider_presets = 12;
    // MCP management
    ListMcpsMsg list_mcps = 13;
    SetLocalMcpsMsg set_local_mcps = 14;
    // Agent management
    ListAgentsMsg list_agents = 15;
    GetAgentMsg get_agent = 16;
    CreateAgentMsg create_agent = 17;
    UpdateAgentMsg update_agent = 18;
    DeleteAgentMsg delete_agent = 19;
    // Hub / packages
    InstallPackageMsg install_package = 20;
    UninstallPackageMsg uninstall_package = 21;
    ListPackagesMsg list_packages = 22;
    // Skills
    ListSkillsMsg list_skills = 23;
    // Enable/disable
    SetEnabledMsg set_enabled = 35;
    // Services
    StartServiceMsg start_service = 24;
    StopServiceMsg stop_service = 25;
    ServiceLogsMsg service_logs = 26;
    // Cron
    CreateCronMsg create_cron = 27;
    DeleteCronMsg delete_cron = 28;
    ListCronsMsg list_crons = 29;
    // Daemon lifecycle
    Ping ping = 30;
    GetConfig get_config = 31;
    ReloadMsg reload = 32;
    GetStats get_stats = 33;
    SubscribeEvents subscribe_events = 34;
  }
}

message SendMsg {
  string agent = 1;
  string content = 2;
  optional uint64 session = 3;
  optional string sender = 4;
  optional string cwd = 5;
  bool new_chat = 6;
  optional string resume_file = 7;
}

message StreamMsg {
  string agent = 1;
  string content = 2;
  optional uint64 session = 3;
  optional string sender = 4;
  optional string cwd = 5;
  bool new_chat = 6;
  optional string resume_file = 7;
}

message Ping {}
message Sessions {}
message SubscribeEvents {}
message GetConfig {}
message GetStats {}

message KillMsg {
  uint64 session = 1;
}

message ReloadMsg {}

message CreateCronMsg {
  string schedule = 1;
  string skill = 2;
  uint64 session = 3;
  optional string quiet_start = 4;
  optional string quiet_end = 5;
  bool once = 6;
}

message DeleteCronMsg {
  uint64 id = 1;
}

message ListCronsMsg {}

message CompactMsg {
  uint64 session = 1;
}

message ListAgentsMsg {}

message GetAgentMsg {
  string name = 1;
}

message CreateAgentMsg {
  string name = 1;
  string config = 2;
}

message UpdateAgentMsg {
  string name = 1;
  string config = 2;
}

message DeleteAgentMsg {
  string name = 1;
}

message ListProvidersMsg {}

message InstallPackageMsg {
  string package = 1;
  string branch = 2;
  string path = 3;
  bool force = 4;
}

message UninstallPackageMsg {
  string package = 1;
}

message ListPackagesMsg {}

message ListSkillsMsg {}

enum ResourceKind {
  RESOURCE_KIND_UNKNOWN = 0;
  PROVIDER = 1;
  MCP = 2;
  SKILL = 3;
}

message SetEnabledMsg {
  ResourceKind kind = 1;
  string name = 2;
  bool enabled = 3;
}

message ListConversationsMsg {
  string agent = 1;
  string sender = 2;
}

message ListMcpsMsg {}

message SetLocalMcpsMsg {
  repeated McpInfo mcps = 1;
}

message SetProviderMsg {
  string name = 1;
  string config = 2;
}

message DeleteProviderMsg {
  string name = 1;
}

message SetActiveModelMsg {
  string model = 1;
}

message ListProviderPresetsMsg {}

message StartServiceMsg {
  string name = 1;
  bool force = 2;
}

message StopServiceMsg {
  string name = 1;
}

message ServiceLogsMsg {
  string name = 1;
  uint32 lines = 2;
}

// ── Server Messages ──────────────────────────────────────────────

message ServerMessage {
  oneof msg {
    // Common
    ErrorMsg error = 1;
    Pong pong = 2;
    // Execution
    SendResponse response = 3;
    StreamEvent stream = 4;
    // Session
    SessionList sessions = 5;
    CompactResponse compact = 6;
    ConversationList conversation_list = 7;
    // Provider
    ProviderList provider_list = 8;
    ProviderPresetList provider_preset_list = 9;
    // MCP
    McpList mcp_list = 10;
    // Agent
    AgentInfo agent_info = 11;
    AgentList agent_list = 12;
    // Hub / packages
    HubEvent hub_event = 13;
    PackageList package_list = 14;
    // Skills
    SkillList skill_list = 15;
    // Services
    ServiceLogOutput service_log_output = 16;
    // Cron
    CronInfo cron_info = 17;
    CronList cron_list = 18;
    // Daemon lifecycle
    ConfigMsg config = 19;
    DaemonStats stats = 20;
    AgentEventMsg agent_event = 21;
  }
}

message DaemonStats {
  uint64 uptime_secs = 1;
  uint32 active_sessions = 2;
  uint32 registered_agents = 3;
  string active_model = 4;
}

message Pong {}

message CompactResponse {
  string summary = 1;
}

message TokenUsage {
  uint32 prompt_tokens = 1;
  uint32 completion_tokens = 2;
  uint32 total_tokens = 3;
  optional uint32 cache_hit_tokens = 4;
  optional uint32 cache_miss_tokens = 5;
  optional uint32 reasoning_tokens = 6;
}

message SendResponse {
  string agent = 1;
  string content = 2;
  uint64 session = 3;
  string provider = 4;
  string model = 5;
  optional TokenUsage usage = 6;
}

message ToolCallInfo {
  string name = 1;
  string arguments = 2;
}

message StreamEvent {
  oneof event {
    StreamStart start = 1;
    StreamChunk chunk = 2;
    StreamThinking thinking = 3;
    ToolStartEvent tool_start = 4;
    ToolResultEvent tool_result = 5;
    ToolsCompleteEvent tools_complete = 6;
    StreamEnd end = 7;
    AskUserEvent ask_user = 8;
  }
}

message StreamStart {
  string agent = 1;
  uint64 session = 2;
}

message StreamChunk {
  string content = 1;
}

message StreamThinking {
  string content = 1;
}

message ToolStartEvent {
  repeated ToolCallInfo calls = 1;
}

message ToolResultEvent {
  string call_id = 1;
  string output = 2;
  uint64 duration_ms = 3;
}

message ToolsCompleteEvent {}

message StreamEnd {
  string agent = 1;
  string error = 2;
  string provider = 3;
  string model = 4;
  optional TokenUsage usage = 5;
}

message AskUserEvent {
  repeated AskQuestion questions = 1;
}

message AskQuestion {
  string question = 1;
  string header = 2;
  repeated AskOption options = 3;
  bool multi_select = 4;
}

message AskOption {
  string label = 1;
  string description = 2;
}

message ReplyToAsk {
  uint64 session = 1;
  string content = 2;
}

message ErrorMsg {
  uint32 code = 1;
  string message = 2;
}

message SessionInfo {
  uint64 id = 1;
  string agent = 2;
  string created_by = 3;
  uint64 message_count = 4;
  uint64 alive_secs = 5;
  bool active = 6;
  string title = 7;
}

enum AgentEventKind {
  TEXT_DELTA = 0;
  THINKING_DELTA = 1;
  TOOL_START = 2;
  TOOL_RESULT = 3;
  TOOLS_COMPLETE = 4;
  DONE = 5;
}

message AgentEventMsg {
  string agent = 1;
  uint64 session = 2;
  AgentEventKind kind = 3;
  string content = 4;
  string timestamp = 5;
}

message SessionList {
  repeated SessionInfo sessions = 1;
}

message ConfigMsg {
  string config = 1;
}

message CronInfo {
  uint64 id = 1;
  string schedule = 2;
  string skill = 3;
  uint64 session = 4;
  string quiet_start = 5;
  string quiet_end = 6;
  bool once = 7;
}

message CronList {
  repeated CronInfo crons = 1;
}

message AgentInfo {
  string name = 1;
  string description = 2;
  string config = 3;
}

message AgentList {
  repeated AgentInfo agents = 1;
}

message ProviderInfo {
  string name = 1;
  bool active = 2;
  string config = 3;
  bool enabled = 4;
}

message ProviderList {
  repeated ProviderInfo providers = 1;
}

message PackageInfo {
  string name = 1;
  string description = 2;
}

message PackageList {
  repeated PackageInfo packages = 1;
}

message ServiceLogOutput {
  string content = 1;
}

message SkillInfo {
  string name = 1;
  bool enabled = 2;
}

message SkillList {
  repeated SkillInfo skills = 1;
}

message ConversationInfo {
  string agent = 1;
  string sender = 2;
  uint32 seq = 3;
  string title = 4;
  string file_path = 5;
  uint64 message_count = 6;
  uint64 alive_secs = 7;
  string date = 8;
}

message ConversationList {
  repeated ConversationInfo conversations = 1;
}

message McpInfo {
  string name = 1;
  string command = 2;
  repeated string args = 3;
  map<string, string> env = 4;
  string url = 5;
  bool auth = 6;
  string source = 7;
  bool auto_restart = 8;
  bool enabled = 9;
}

message McpList {
  repeated McpInfo mcps = 1;
}

enum ProviderKind {
  PROVIDER_KIND_UNKNOWN = 0;
  OPENAI = 1;
  ANTHROPIC = 2;
  GOOGLE = 3;
  BEDROCK = 4;
  OLLAMA = 5;
  AZURE = 6;
  LLAMA_CPP = 7;
}

message ProviderPresetInfo {
  string name = 1;
  ProviderKind kind = 2;
  string base_url = 3;
  string fixed_base_url = 4;
  string default_model = 5;
}

message ProviderPresetList {
  repeated ProviderPresetInfo presets = 1;
}

// ── Hub Events ──────────────────────────────────────────────────

message HubEvent {
  oneof event {
    HubStep step = 1;
    HubWarning warning = 2;
    HubSetupOutput setup_output = 3;
    HubDone done = 4;
  }
}

message HubStep {
  string message = 1;
}

message HubWarning {
  string message = 1;
}

message HubSetupOutput {
  string content = 1;
}

message HubDone {
  string error = 1;
}
