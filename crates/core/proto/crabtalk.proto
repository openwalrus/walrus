syntax = "proto3";

package crabtalk.protocol;

option swift_prefix = "CrabtalkProto_";

// ── Client Messages ──────────────────────────────────────────────

message ClientMessage {
  oneof msg {
    SendMsg send = 1;
    StreamMsg stream = 2;
    Ping ping = 3;
    HubMsg hub = 4;
    Sessions sessions = 5;
    KillMsg kill = 6;
    Tasks tasks = 7;
    KillTaskMsg kill_task = 8;
    ApproveMsg approve = 9;
    // Field 10 removed — reserved to prevent accidental reuse.
    SubscribeTasks subscribe_tasks = 11;
    Downloads downloads = 12;
    SubscribeDownloads subscribe_downloads = 13;
    GetConfig get_config = 14;
    SetConfigMsg set_config = 15;
    ServiceQueryMsg service_query = 16;
    GetServiceSchemaMsg get_service_schema = 17;
    GetAllSchemasMsg get_all_schemas = 18;
    GetServicesMsg get_services = 19;
    SetServiceConfigMsg set_service_config = 20;
    ReloadMsg reload = 21;
  }
}

message SendMsg {
  string agent = 1;
  string content = 2;
  optional uint64 session = 3;
  optional string sender = 4;
}

message StreamMsg {
  string agent = 1;
  string content = 2;
  optional uint64 session = 3;
  optional string sender = 4;
}

message Ping {}
message Sessions {}
message Tasks {}
message SubscribeTasks {}
message Downloads {}
message SubscribeDownloads {}
message GetConfig {}

message HubMsg {
  string package = 1;
  HubAction action = 2;
  // Optional filters: "skill:name", "mcp:name", "service:name", "agent:name".
  // If empty, all components are installed/uninstalled.
  repeated string filters = 3;
}

enum HubAction {
  HUB_ACTION_INSTALL = 0;
  HUB_ACTION_UNINSTALL = 1;
}

message KillMsg {
  uint64 session = 1;
}

message KillTaskMsg {
  uint64 task_id = 1;
}

message ApproveMsg {
  uint64 task_id = 1;
  string response = 2;
}

message SetConfigMsg {
  string config = 1;
}

message ServiceQueryMsg {
  string service = 1;
  string query = 2;
}

message GetServiceSchemaMsg {
  string service = 1;
}

message GetAllSchemasMsg {}

message GetServicesMsg {}

message ReloadMsg {}

message SetServiceConfigMsg {
  string service = 1;
  string config = 2;
}

// ── Server Messages ──────────────────────────────────────────────

message ServerMessage {
  oneof msg {
    SendResponse response = 1;
    StreamEvent stream = 2;
    DownloadEvent download = 3;
    ErrorMsg error = 4;
    Pong pong = 5;
    SessionList sessions = 6;
    DownloadList downloads = 7;
    TaskList tasks = 8;
    TaskEvent task = 9;
    // Field 10 removed — reserved to prevent accidental reuse.
    ConfigMsg config = 11;
    ServiceQueryResultMsg service_query_result = 12;
    ServiceSchemaMsg service_schema = 13;
    AllSchemasMsg all_schemas = 14;
    ServiceListMsg service_list = 15;
  }
}

message Pong {}

message SendResponse {
  string agent = 1;
  string content = 2;
  uint64 session = 3;
}

message ToolCallInfo {
  string name = 1;
  string arguments = 2;
}

message StreamEvent {
  oneof event {
    StreamStart start = 1;
    StreamChunk chunk = 2;
    StreamThinking thinking = 3;
    ToolStartEvent tool_start = 4;
    ToolResultEvent tool_result = 5;
    ToolsCompleteEvent tools_complete = 6;
    StreamEnd end = 7;
  }
}

message StreamStart {
  string agent = 1;
  uint64 session = 2;
}

message StreamChunk {
  string content = 1;
}

message StreamThinking {
  string content = 1;
}

message ToolStartEvent {
  repeated ToolCallInfo calls = 1;
}

message ToolResultEvent {
  string call_id = 1;
  string output = 2;
}

message ToolsCompleteEvent {}

message StreamEnd {
  string agent = 1;
}

enum DownloadKind {
  DOWNLOAD_KIND_HUB = 0;
  DOWNLOAD_KIND_EMBEDDINGS = 1;
  DOWNLOAD_KIND_SKILL = 2;
  DOWNLOAD_KIND_HOOK = 3;
}

message DownloadEvent {
  oneof event {
    DownloadCreated created = 1;
    DownloadProgress progress = 2;
    DownloadStep step = 3;
    DownloadCompleted completed = 4;
    DownloadFailed failed = 5;
  }
}

message DownloadCreated {
  uint64 id = 1;
  DownloadKind kind = 2;
  string label = 3;
}

message DownloadProgress {
  uint64 id = 1;
  uint64 bytes = 2;
  uint64 total_bytes = 3;
}

message DownloadStep {
  uint64 id = 1;
  string message = 2;
}

message DownloadCompleted {
  uint64 id = 1;
}

message DownloadFailed {
  uint64 id = 1;
  string error = 2;
}

message DownloadInfo {
  uint64 id = 1;
  DownloadKind kind = 2;
  string label = 3;
  string status = 4;
  uint64 bytes_downloaded = 5;
  uint64 total_bytes = 6;
  optional string error = 7;
  uint64 alive_secs = 8;
}

message ErrorMsg {
  uint32 code = 1;
  string message = 2;
}

message SessionInfo {
  uint64 id = 1;
  string agent = 2;
  string created_by = 3;
  uint64 message_count = 4;
  uint64 alive_secs = 5;
}

message SessionList {
  repeated SessionInfo sessions = 1;
}

message DownloadList {
  repeated DownloadInfo downloads = 1;
}

message TaskInfo {
  uint64 id = 1;
  optional uint64 parent_id = 2;
  string agent = 3;
  string status = 4;
  string description = 5;
  optional string result = 6;
  optional string error = 7;
  string created_by = 8;
  uint64 prompt_tokens = 9;
  uint64 completion_tokens = 10;
  uint64 alive_secs = 11;
  optional string blocked_on = 12;
}

message TaskList {
  repeated TaskInfo tasks = 1;
}

message TaskEvent {
  oneof event {
    TaskCreated created = 1;
    TaskStatusChanged status_changed = 2;
    TaskCompleted completed = 3;
  }
}

message TaskCreated {
  TaskInfo task = 1;
}

message TaskStatusChanged {
  uint64 task_id = 1;
  string status = 2;
  optional string blocked_on = 3;
}

message TaskCompleted {
  uint64 task_id = 1;
  string status = 2;
  optional string result = 3;
  optional string error = 4;
}

// Core daemon config only. Per-service configs are fetched via
// GetServiceSchema / GetAllSchemas and set via SetServiceConfig.
message ConfigMsg {
  string config = 1;
}

message ServiceSchemaMsg {
  string service = 1;
  string schema = 2;
}

message AllSchemasMsg {
  map<string, string> schemas = 1;
}

message ServiceInfoMsg {
  string name = 1;
  string kind = 2;
  string status = 3;
  repeated string capabilities = 4;
  bool has_config = 5;
}

message ServiceListMsg {
  repeated ServiceInfoMsg services = 1;
}

message ServiceQueryResultMsg {
  string result = 1;
}
