[package]
name = "crabtalk-mcp"
description = "MCP (Model Context Protocol) client and bridge for Crabtalk"
documentation = "https://docs.rs/crabtalk-mcp"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true

[dependencies]
wcore.workspace = true

anyhow.workspace = true
parking_lot.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["process", "io-util"] }
tracing.workspace = true

# HTTP backends — pick exactly one of `reqwest` or `hyper`.
reqwest = { workspace = true, optional = true }
hyper = { workspace = true, optional = true }
hyper-util = { workspace = true, optional = true }
http = { workspace = true, optional = true }
http-body-util = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
hyper-tls = { workspace = true, optional = true }
hyper-rustls = { workspace = true, optional = true }

[features]
default = ["hyper", "native-tls"]

# Backends (mutually exclusive).
reqwest = ["dep:reqwest"]
hyper = [
    "dep:hyper",
    "dep:hyper-util",
    "dep:http",
    "dep:http-body-util",
    "dep:bytes",
]

# TLS (mutually exclusive). Wire through to whichever backend is selected.
native-tls = ["reqwest?/native-tls", "dep:hyper-tls"]
rustls = ["reqwest?/rustls", "dep:hyper-rustls"]
