[package]
name = "crabtalk-runtime"
description = "Crabtalk agent runtime — tool dispatch, MCP, skills, and memory"
documentation = "https://docs.rs/crabtalk-runtime"
readme = "README.md"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true

[dependencies]
wcore.workspace = true
crabllm-core.workspace = true

# crates.io
anyhow.workspace = true
async-stream.workspace = true
chrono.workspace = true
futures-core.workspace = true
futures-util.workspace = true
reqwest.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yml.workspace = true
tokio = { workspace = true, features = ["process"] }
toml.workspace = true
tracing.workspace = true

[dev-dependencies]
futures-util.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
wcore = { workspace = true, features = ["test-utils"] }
