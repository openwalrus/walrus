[package]
name = "crabtalk-node"
description = "Crabtalk node — runtime + transport + event loop"
documentation = "https://docs.rs/crabtalk-node"
readme = "README.md"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true

[dependencies]
crabtalk-plugins.workspace = true
crabtalk-command.workspace = true
crabllm-core.workspace = true
crabllm-provider.workspace = true
runtime.workspace = true
transport.workspace = true
wcore.workspace = true

# crates.io
anyhow.workspace = true
bytes.workspace = true
chrono.workspace = true
cron.workspace = true
async-stream.workspace = true
futures-core.workspace = true
futures-util.workspace = true
rand.workspace = true
reqwest.workspace = true
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yml.workspace = true
tokio.workspace = true
toml = { workspace = true, optional = true }
toml_edit = { workspace = true, optional = true }
tracing.workspace = true
ulid = { workspace = true, optional = true }

[features]
default = ["fs"]
fs = ["dep:toml", "dep:toml_edit", "dep:ulid"]

[dev-dependencies]
tempfile.workspace = true
wcore = { workspace = true, features = ["testing"] }
