[workspace]
resolver = "3"
members = ["crates/*"]

[workspace.package]
version = "0.0.3"
edition = "2024"
authors = ["clearloop <tianyi.gc@gmail.com>"]
license = "GPL-3.0"
repository = "https://github.com/openwalrus/walrus"
keywords = ["llm", "agent", "ai"]

[workspace.dependencies]
channel = { path = "crates/channel", package = "walrus-channel", version = "0.0.3" }
cli = { path = "crates/cli", package = "openwalrus", version = "0.0.3" }
daemon = { path = "crates/daemon", package = "walrus-daemon", version = "0.0.3" }
memory = { path = "crates/memory", package = "walrus-memory", version = "0.0.3" }
model = { path = "crates/model", package = "walrus-model", version = "0.0.3" }
socket = { path = "crates/socket", package = "walrus-socket", version = "0.0.3" }
wcore = { path = "crates/core", package = "walrus-core", version = "0.0.3" }

# crates.io
anyhow = "1"
async-stream = "0.3"
chrono = "0.4"
clap = { version = "4", features = ["derive"] }
compact_str = { version = "0.8", features = ["serde"] }
dirs = "6"
dotenvy = "0.15"
futures-core = "0.3"
futures-util = "0.3"
hf-hub = { version = "0.5.0", features = ["tokio"] }
mistralrs = { version = "0.7", default-features = false }
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "stream",
    "rustls-tls",
] }
rmcp = { version = "0.16", features = ["client", "transport-child-process"] }
rusqlite = { version = "0.34", features = ["bundled"] }
rustyline = { version = "15", features = ["derive"] }
schemars = "1.1.0"
serenity = { version = "0.12", default-features = false, features = ["client", "gateway", "model", "rustls_backend"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
smallvec = { version = "1", features = ["serde"] }
tokio = { version = "1", features = [
    "rt-multi-thread",
    "macros",
    "signal",
    "io-util",
    "net",
    "sync",
    "time",
] }
teloxide = { version = "0.17", default-features = false, features = ["native-tls"] }
toml = "0.8"
toml_edit = "0.22"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.prod]
inherits = "release"
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
debug = false
debug-assertions = false
overflow-checks = false
strip = true

[workspace.metadata.conta]
packages = ["wcore", "socket", "channel", "memory", "model", "daemon", "cli"]
