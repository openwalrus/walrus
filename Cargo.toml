[workspace]
resolver = "3"
members = ["apps/*", "crates/*"]

[workspace.package]
version = "0.0.10"
edition = "2024"
authors = ["clearloop <tianyi.gc@gmail.com>"]
license = "GPL-3.0"
repository = "https://github.com/openwalrus/walrus"
keywords = ["llm", "agent", "ai"]

[workspace.dependencies]
gateway = { path = "crates/gateway", package = "walrus-gateway", version = "0.0.10" }
cli = { path = "crates/cli", package = "openwalrus", version = "0.0.10" }
daemon = { path = "crates/daemon", package = "walrus-daemon", version = "0.0.10" }
model = { path = "crates/model", package = "walrus-model", version = "0.0.10" }
transport = { path = "crates/transport", package = "walrus-transport", version = "0.0.10" }
wcore = { path = "crates/core", package = "walrus-core", version = "0.0.10" }
wsearch = { path = "apps/search", package = "walrus-search", version = "0.0.10", default-features = false }

# crabtalk
crabtalk-core = "0.0.6"
crabtalk-provider = "0.0.6"

# crates.io
anyhow = "1"
arrow-array = "56"
arrow-schema = "56"
async-stream = "0.3"
chrono = "0.4"
clap = { version = "4", features = ["derive"] }
compact_str = { version = "0.8", features = ["serde"] }
crossterm = "0.28"
dialoguer = "0.11"
dirs = "6"
dotenvy = "0.15"
heck = "0.5"
futures = "0.3"
futures-core = "0.3"
futures-util = "0.3"
lru = "0.14"
openssl-sys = { version = "0.9", features = ["vendored"] }
percent-encoding = "2"
rand = "0.9"
ratatui = "0.29"
scraper = "0.22"
prost = "0.13"
prost-build = "0.13"
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "stream",
    "rustls-tls",
] }
rmcp = { version = "0.16", features = ["client", "transport-child-process"] }
rusqlite = { version = "0.34", features = ["bundled"] }
rustyline = { version = "15", features = ["derive"] }
schemars = "1.1.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
smallvec = { version = "1", features = ["serde"] }
thiserror = "2"
tokenizers = { version = "0.21", default-features = false, features = ["onig"] }
tokio = { version = "1", features = [
    "rt-multi-thread",
    "macros",
    "signal",
    "io-util",
    "net",
    "sync",
    "time",
] }
teloxide = { version = "0.17", default-features = false, features = ["rustls"] }
toml = "0.8"
proc-macro2 = "1"
quote = "1"
toml_edit = "0.22"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2"

[profile.prod]
inherits = "release"
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
debug = false
debug-assertions = false
overflow-checks = false
strip = true

[workspace.metadata.conta]
packages = ["wcore", "transport", "gateway", "model", "daemon", "cli"]
